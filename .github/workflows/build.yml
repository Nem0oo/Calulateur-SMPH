name: Build and Deploy Calculateur SMPH

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build_and_test:
    if: github.event_name == 'pull_request'
    name: Build Docker Image
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
      - name: Build Docker image
        run: |
          docker build -t smph .
      - name: Running container
        run: |
          docker run -d --name smph -p 8080:80 smph
      - name: Wait for Apache
        run: sleep 2
      - name: Test title
        run: |
          curl -s http://localhost:8080 | grep -q "<h1>Calculateur IBU SMPH</h1>"
      - name: Stop container
        run: |
          docker stop smph

  build_and_push_to_docker_hub:
    if: github.event_name == 'push'
    name: Build Docker Image with tags
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
      - name: Build Docker image
        run: |
          docker build -t ${{ secrets.DOCKERHUB_USERNAME }}/smph:sha-${{ github.sha }} -t ${{ secrets.DOCKERHUB_USERNAME }}/smph:latest .
      - name: Login to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - name: Push Docker image
        run: |
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/smph:sha-${{ github.sha }}
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/smph:latest

  trigger_watchtower:
    if: github.event_name == 'push'
    needs: build_and_push_to_docker_hub
    runs-on: ubuntu-latest
    steps:
      - name: Trigger deploy via n8n
        run: |
          curl -H "Content-Type: application/json" "https://n8n.gcourtot.fr/webhook/${{ secrets.N8N_WEBHOOK_ID }}"
